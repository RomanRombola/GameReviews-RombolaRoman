{% extends "base.html" %}

{% block title %}Cambiar Contraseña — GameReviews{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-page__header">
    <a href="{% url 'perfil' %}" class="back-link">← Volver al perfil</a>
    <h1>Cambiar Contraseña</h1>
  </div>
  <div class="card">
    <form method="post" class="form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Guardar nueva contraseña</button>
    </form>
  </div>
</div>
{% endblock %}
