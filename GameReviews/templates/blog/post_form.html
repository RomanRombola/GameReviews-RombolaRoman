{% extends "base.html" %}

{% block title %}{{ titulo }} — GameReviews{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-page__header">
    <a href="{% url 'posts' %}" class="back-link">← Volver</a>
    <h1>{{ titulo }}</h1>
  </div>
  <div class="card">
    <form method="post" enctype="multipart/form-data" class="form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Guardar</button>
    </form>
  </div>
</div>
{% endblock %}
